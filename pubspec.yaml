name: blockit_app
description: A digital wellbeing app for focused screen-free sessions.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.4
  get_it: ^7.6.7
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  google_sign_in: ^6.2.1
  firebase_core: ^2.25.4
  firebase_auth: ^4.17.4
  cloud_firestore: ^4.15.4
  in_app_purchase: ^3.1.13
  google_mobile_ads: ^5.1.0
  fl_chart: ^0.66.2
  permission_handler: ^11.3.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  intl: ^0.19.0
  flutter_local_notifications: ^17.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  bloc_test: ^9.1.6
  mocktail: ^1.0.3
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets: []
