name: Build Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: stable

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_BASE64" | base64 -d > android/app/google-services.json

      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Verify Flutter
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Build split APKs
        run: flutter build apk --release --split-per-abi --target-platform android-arm64,android-arm,android-x64

      - name: Upload ARM64 APK
        uses: actions/upload-artifact@v4
        with:
          name: blockit-arm64-v8a-release
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - name: Upload ARM (32-bit) APK
        uses: actions/upload-artifact@v4
        with:
          name: blockit-armeabi-v7a-release
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk

      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v4
        with:
          name: blockit-x86_64-release
          path: build/app/outputs/flutter-apk/app-x86_64-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Blockit v${{ steps.version.outputs.version }}
          body: |
            ## 🚀 Blockit Release v${{ steps.version.outputs.version }}

            ### 📱 Download APKs
            Choose the APK for your device architecture:
            - **arm64-v8a** - Most modern Android phones
            - **armeabi-v7a** - Older 32-bit devices
            - **x86_64** - Emulators and some tablets

            ### ✨ What's New
            - Complete digital wellbeing blocking system
            - Firebase integration for authentication and cloud sync
            - Accessibility Service for reliable app blocking
            - Device Admin for screen lock
            - Session timer with difficulty levels
            - Parachute emergency escape system
            - Stats dashboard with charts
            - Dark theme UI
            - ProGuard/R8 optimized (smaller APK size)

            ### ⚠️ Installation Note
            You may need to disable Play Protect temporarily to install.
            After installing, enable all permissions in app settings.
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          draft: false
          prerelease: true
          generateReleaseNotes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
