name: Build Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: stable

      - name: Verify Flutter
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Build split APKs
        run: flutter build apk --release --split-per-abi --target-platform android-arm64,android-arm,android-x64

      - name: Upload ARM64 APK
        uses: actions/upload-artifact@v4
        with:
          name: blockit-arm64-v8a-release
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - name: Upload ARM (32-bit) APK
        uses: actions/upload-artifact@v4
        with:
          name: blockit-armeabi-v7a-release
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk

      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v4
        with:
          name: blockit-x86_64-release
          path: build/app/outputs/flutter-apk/app-x86_64-release.apk
